<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cyber Nerdy Birdy</title>
<style>
:root{
  --bg:#020b18; --panel:#071d3de8; --cyan:#19d9ff; --green:#73d839;
  --red:#e83f3f; --yellow:#ffd44c; --blue:#0d63c6; --white:#f7fbff;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:#020914;color:var(--white);font-family:Arial,Helvetica,sans-serif;overflow:hidden}
body{display:grid;place-items:center}
#game{
  position:relative;width:min(100vw,177.777vh);aspect-ratio:16/9;max-width:1920px;max-height:1080px;
  overflow:hidden;background:#05142b;border:2px solid #16d8ff55;box-shadow:0 0 45px #00bfff33;
}
.screen{position:absolute;inset:0;display:none}
.screen.active{display:block}
#title{
  background:url("assets/title_screen.jpg") center/cover no-repeat;
}
.title-hotspots button{
  position:absolute;border:0;background:transparent;cursor:pointer;border-radius:18px;
}
.title-hotspots button:focus-visible{outline:5px solid white}
#playHotspot{left:13.2%;top:69%;width:28.2%;height:10.2%}
#howHotspot{left:13.2%;top:80%;width:28.2%;height:7.4%}
#leaderHotspot{
    left: 13.2%;
    top: 90%;
    width: 28.2%;
    height: 7.4%
}

.bg{
  position:absolute;inset:0;
  background:radial-gradient(circle at 72% 36%,#1479c944,transparent 25%),linear-gradient(#06152d,#09244a 58%,#031020);
}
.city{
  position:absolute;left:0;right:0;bottom:0;height:45%;opacity:.62;
  background:linear-gradient(90deg,#061b36 0 7%,transparent 7% 12%,#0a315f 12% 20%,transparent 20% 26%,#092b54 26% 36%,transparent 36% 44%,#0b3c70 44% 53%,transparent 53% 60%,#071d3a 60% 70%,transparent 70% 78%,#0a315f 78% 88%,transparent 88%);
  clip-path:polygon(0 30%,7% 16%,9% 42%,17% 23%,23% 36%,29% 10%,35% 35%,44% 18%,51% 42%,59% 25%,67% 37%,75% 13%,83% 34%,91% 21%,100% 38%,100% 100%,0 100%);
}
.panel{
  background:var(--panel);border:2px solid #16d8ff77;border-radius:24px;
  box-shadow:0 20px 45px #0008,inset 0 0 20px #16d8ff22;
}
button.real{
  border:0;border-radius:18px;min-height:64px;font-weight:900;color:white;font-size:clamp(18px,2vw,34px);
  cursor:pointer;box-shadow:inset 0 4px #ffffff44,0 8px #0007;padding:14px 22px;
}
button.real:hover,button.real:focus-visible{outline:4px solid white;filter:brightness(1.14)}
.primary{background:linear-gradient(#91ef47,#318719)}
.secondary{background:linear-gradient(#147be3,#073d90)}
.danger{background:linear-gradient(#ff6464,#a81414)}
.topbar{position:absolute;top:3%;left:4%;right:4%;display:flex;justify-content:space-between;align-items:center;z-index:5}
.topbar h1{font-size:clamp(24px,3vw,54px);margin:0;text-shadow:0 0 16px #16d8ff}
.scorebox{font-size:clamp(16px,1.8vw,30px);font-weight:900;display:flex;gap:18px;align-items:center}
.map-grid{position:absolute;left:7%;right:7%;top:25%;display:grid;grid-template-columns:repeat(5,1fr);gap:24px;z-index:4}
.node{padding:24px 12px;text-align:center;min-height:180px;color:white}
.node .num{width:76px;aspect-ratio:1;margin:0 auto 14px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(#99f146,#318719);font-size:40px;font-weight:1000;box-shadow:0 0 22px #7ee23f88}
.node.locked .num{background:linear-gradient(#858585,#333)}
.node h2{font-size:clamp(16px,1.5vw,28px);margin:8px 0}
.question-layout{position:absolute;left:6%;right:6%;top:12%;bottom:24%;display:grid;grid-template-columns:1fr 360px;gap:28px;z-index:3}
.email{background:#f7f7f1;color:#142239;border-radius:20px;padding:28px;font-size:clamp(16px,1.3vw,25px);box-shadow:0 20px 38px #0008}
.email h2{font-size:clamp(26px,2.4vw,46px);margin:0 0 18px;color:#08213f}
.email a{color:#005bd8;font-weight:900}
.checklist{padding:24px;font-size:clamp(16px,1.3vw,24px)}
.answer-row{position:absolute;left:7%;right:7%;bottom:10%;display:grid;grid-template-columns:1fr 1fr;gap:28px;z-index:5}
.timer-wrap{position:absolute;left:50%;bottom:4%;transform:translateX(-50%);width:min(70%,900px);height:32px;border-radius:999px;background:#ffffff22;border:2px solid #ffffff55;overflow:hidden;z-index:6}
#timerFill{height:100%;width:100%;background:linear-gradient(90deg,var(--green),var(--yellow));transition:width .2s linear}
.feedback-card{position:absolute;inset:15% 15%;display:grid;place-items:center;text-align:center;padding:46px;z-index:4}
.feedback-card h1{font-size:clamp(56px,7vw,132px);margin:0 0 18px}
.feedback-card p{font-size:clamp(20px,2vw,38px);max-width:1000px}
.bird-mini{position:absolute;right:5%;bottom:3%;font-size:clamp(52px,7vw,120px);filter:drop-shadow(0 12px 18px #0009)}
.bottom-left{position:absolute;left:4%;bottom:4%;width:min(240px,24vw);z-index:7}
@media(max-width:800px){
  .map-grid{grid-template-columns:1fr 1fr;top:17%;bottom:12%;overflow:auto}
  .question-layout{grid-template-columns:1fr;inset:10% 5% 28%}.checklist{display:none}
  .answer-row{grid-template-columns:1fr;bottom:9%;gap:12px}.timer-wrap{bottom:2%}
}
</style>
</head>
<body>
<main id="game" aria-label="Cyber Nerdy Birdy HTML5 cybersecurity training game">
  <section id="title" class="screen active" aria-label="Cyber Nerdy Birdy title screen">
    <div class="title-hotspots">
      <button id="playHotspot" aria-label="Play Cyber Nerdy Birdy" onclick="show('map')"></button>
      <button id="howHotspot" aria-label="How to play" onclick="howToPlay()"></button>
      <button id="leaderHotspot" aria-label="Leaderboard" onclick="leaderboard()"></button>
    </div>
  </section>

  <section id="map" class="screen">
    <div class="bg"></div><div class="city"></div>
    <div class="topbar"><h1>Cyber Journey</h1><div class="scorebox"><span id="mapScore">⭐ 0 XP</span><span>🛡️ Phishing Basics</span></div></div>
    <div class="map-grid">
      <button class="node panel real" onclick="startLevel(0)"><div class="num">1</div><h2>Inbox Basics</h2><p>Spot safe vs suspicious emails.</p></button>
      <button class="node panel real" onclick="startLevel(1)"><div class="num">2</div><h2>Urgency Tricks</h2><p>Detect pressure tactics.</p></button>
      <button class="node panel real" onclick="startLevel(2)"><div class="num">3</div><h2>Phishing Links</h2><p>Inspect strange links.</p></button>
      <button class="node panel real locked" disabled><div class="num">🔒</div><h2>Attachments</h2><p>Coming soon</p></button>
      <button class="node panel real locked" disabled><div class="num">🔒</div><h2>Data Protection</h2><p>Coming soon</p></button>
    </div>
    <button class="real secondary bottom-left" onclick="show('title')">← BACK</button>
  </section>

  <section id="question" class="screen">
    <div class="bg"></div><div class="city"></div>
    <div class="topbar">
      <h1>Is this email safe or phishy?</h1>
      <div class="scorebox"><span id="lives">❤️❤️❤️</span><span id="score">Score: 0</span><span id="timeText">15s</span></div>
    </div>
    <div class="question-layout">
      <article class="email">
        <h2>Email Review</h2>
        <p><strong>From:</strong> <span id="fromText"></span></p>
        <p><strong>Subject:</strong> <span id="subjectText"></span></p>
        <hr>
        <p id="bodyText"></p>
        <p><a href="#" onclick="event.preventDefault()" id="linkText"></a></p>
      </article>
      <aside class="panel checklist">
        <h2>Things to Check</h2>
        <p>☑ Sender address</p>
        <p>☑ Urgent wording</p>
        <p>☑ Suspicious links</p>
        <p>☑ Requests for passwords or money</p>
      </aside>
    </div>
    <div class="answer-row">
      <button class="real primary" onclick="answer('safe')">✅ SAFE</button>
      <button class="real danger" onclick="answer('phishy')">⚠️ PHISHY</button>
    </div>
    <div class="timer-wrap"><div id="timerFill"></div></div>
  </section>

  <section id="feedback" class="screen">
    <div class="bg"></div><div class="city"></div>
    <div class="feedback-card panel">
      <div>
        <h1 id="feedbackTitle">Great Job!</h1>
        <p id="feedbackText"></p>
        <button class="real primary" onclick="continueGame()">CONTINUE</button>
      </div>
    </div>
    <div class="bird-mini">🐦‍⬛</div>
  </section>
</main>

<script>
const questions = [
  {
    from:"IT Support <support@secure-update.com>",
    subject:"Urgent: Verify Your Account Immediately",
    body:"Dear Employee, we noticed unusual activity. To prevent suspension, verify your account now using the link below.",
    link:"http://secure-update.com/verify",
    answer:"phishy",
    explanation:"This is phishy because the domain is not a trusted company domain and the email creates urgency."
  },
  {
    from:"HR Team <hr@yourcompany.com>",
    subject:"Updated Benefits Guide Available",
    body:"The updated benefits guide is available in the employee portal. Please sign in through the normal company intranet.",
    link:"https://intranet.yourcompany.com/benefits",
    answer:"safe",
    explanation:"This is safe because it uses a trusted company domain and points to the normal intranet."
  },
  {
    from:"Payroll Alert <payroll-alert@yourcompany-payroll.net>",
    subject:"Final Notice: Direct Deposit Failed",
    body:"Your payroll deposit failed. Confirm your bank information within 15 minutes to avoid a delay.",
    link:"http://yourcompany-payroll.net/bank-update",
    answer:"phishy",
    explanation:"This is phishy because it asks for banking information, uses urgency, and comes from an odd domain."
  },
  {
    from:"Security Training <training@yourcompany.com>",
    subject:"Cybersecurity Awareness Quiz Opens Today",
    body:"Your quarterly cybersecurity quiz is ready. Open the training portal from your company dashboard.",
    link:"https://training.yourcompany.com",
    answer:"safe",
    explanation:"This is safe because the sender and link are consistent with the company training portal."
  },
  {
    from:"Microsoft Security <account-security@micros0ft-login.com>",
    subject:"Your password expires today",
    body:"Your account will be locked. Enter your username and password now to prevent access loss.",
    link:"http://micros0ft-login.com/session",
    answer:"phishy",
    explanation:"This is phishy because the domain uses a zero instead of an o and asks for credentials."
  }
];

let index = 0;
let score = 0;
let lives = 3;
let timeLeft = 15;
let timer = null;
let locked = false;

function show(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.getElementById("mapScore").textContent = "⭐ " + score + " XP";
}
function howToPlay(){
  alert("How to Play:\\n\\nRead each email. You have 15 seconds per question. Choose SAFE or PHISHY. Look for suspicious senders, urgent language, fake links, and requests for passwords or money.");
}
function leaderboard(){
  alert("Leaderboard:\\n1. CyberChamp — 2450 XP\\n2. SecureSara — 1980 XP\\n3. DataDefender — 1750 XP\\n4. NerdyUser — 1250 XP");
}
function startLevel(i){
  index = i;
  loadQuestion();
  show("question");
  startTimer();
}
function loadQuestion(){
  const q = questions[index % questions.length];
  fromText.textContent = q.from;
  subjectText.textContent = q.subject;
  bodyText.textContent = q.body;
  linkText.textContent = q.link;
  locked = false;
  updateHud();
}
function updateHud(){
  document.getElementById("score").textContent = "Score: " + score;
  document.getElementById("lives").textContent = "❤️".repeat(Math.max(0,lives));
}
function startTimer(){
  clearInterval(timer);
  timeLeft = 15;
  timeText.textContent = "15s";
  timerFill.style.width = "100%";
  timer = setInterval(() => {
    timeLeft -= 1;
    timeText.textContent = timeLeft + "s";
    timerFill.style.width = (timeLeft / 15 * 100) + "%";
    if(timeLeft <= 0) answer("timeout");
  }, 1000);
}
function answer(choice){
  if(locked) return;
  locked = true;
  clearInterval(timer);
  const q = questions[index % questions.length];
  const correct = choice === q.answer;
  if(correct){
    score += 100;
    feedbackTitle.textContent = "Great Job!";
    feedbackTitle.style.color = "var(--green)";
    feedbackText.textContent = q.explanation + " +100 XP";
  } else {
    lives -= 1;
    feedbackTitle.textContent = choice === "timeout" ? "Time’s Up!" : "Oops!";
    feedbackTitle.style.color = "var(--red)";
    feedbackText.textContent = q.explanation + " You lost one life.";
  }
  updateHud();
  show("feedback");
}
function continueGame(){
  if(lives <= 0){
    alert("Training complete. Final score: " + score + " XP");
    index = 0; score = 0; lives = 3;
    show("title");
    return;
  }
  index += 1;
  if(index >= questions.length){
    alert("Level complete! Final score: " + score + " XP");
    show("map");
  } else {
    loadQuestion();
    show("question");
    startTimer();
  }
}
</script>
</body>
</html>
